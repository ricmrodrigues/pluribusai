name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: python3 -m py_compile server.py store.py
      - name: Lifecycle tests
        run: python3 tests/test_lifecycle.py
      - name: Activity tests
        run: python3 tests/test_activity.py
      - name: HTTP tests
        run: python3 tests/test_http.py
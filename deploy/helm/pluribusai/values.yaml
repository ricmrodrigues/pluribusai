# Default: helm install pluribusai — SQLite + bundled auth, no external deps.
replicaCount: 1

image:
  repository: pluribusai
  tag: "0.6.0"
  # Use Never when loading a locally built image (Docker Desktop / kind).
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

store:
  # sqlite — single-replica, PVC at /data (default, easiest install)
  # postgres — bundled or externalDatabase
  type: sqlite

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

postgresql:
  # Bundled Postgres when store.type=postgres and externalDatabase.host is empty.
  enabled: true
  image: postgres:16-alpine
  auth:
    database: pluribusai
    username: pluribusai
    # Leave empty to use autogenerated secret value "changeme" — override in prod.
    password: ""
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""

externalDatabase:
  host: ""
  port: 5432
  database: pluribusai
  user: pluribusai
  password: ""

auth:
  # Required for a working install — pass via --set auth.token=...
  token: ""
  apiKeys: {}
  existingSecret: ""
  # Control-plane JWT (commercial stack) — same secret as CONTROL_PLANE_SECRET
  jwtSecret: ""
  jwtIssuer: pluribusai-control
  # Data plane validates pk_* keys via control plane (Docker Desktop: host.docker.internal)
  controlPlaneUrl: ""
  internalSecret: ""

service:
  type: ClusterIP
  port: 8787
  # Set type=NodePort (+ nodePort) for LAN access without port-forward.
  nodePort: 30787

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: pluribusai.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

podAnnotations: {}

livenessProbe:
  path: /health
readinessProbe:
  path: /health

# Port-forward friendly post-install hint
notes:
  servicePortForward: true
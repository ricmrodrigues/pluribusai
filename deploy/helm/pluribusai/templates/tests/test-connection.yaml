apiVersion: v1
kind: Pod
metadata:
  name: {{ include "pluribusai.fullname" . }}-test
  labels:
    {{- include "pluribusai.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.5.0
      command:
        - sh
        - -c
        - |
          set -e
          curl -sf "http://{{ include "pluribusai.fullname" . }}:{{ .Values.service.port }}/health" | grep -q '"status"'
          curl -sf "http://{{ include "pluribusai.fullname" . }}:{{ .Values.service.port }}/health" | grep -q 'ok'
          echo "health check passed"
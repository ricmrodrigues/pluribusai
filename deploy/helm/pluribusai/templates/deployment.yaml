apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pluribusai.fullname" . }}
  labels:
    {{- include "pluribusai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "pluribusai.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pluribusai.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if or (eq (include "pluribusai.useBundledPostgres" .) "true") (eq (include "pluribusai.useExternalPostgres" .) "true") }}
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "pluribusai.pgHost" . }} {{ .Values.externalDatabase.port | default 5432 }}; do
                echo waiting for postgres...
                sleep 2
              done
      {{- end }}
      containers:
        - name: pluribusai
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8787
          env:
            - name: PLURIBUSAI_HTTP_PORT
              value: "8787"
            - name: PLURIBUSAI_LOG_FORMAT
              value: json
            {{- if eq .Values.store.type "sqlite" }}
            - name: PLURIBUSAI_STORE
              value: sqlite
            - name: PLURIBUSAI_DB
              value: /data/queue.db
            {{- else }}
            - name: PLURIBUSAI_STORE
              value: postgres
            - name: PGHOST
              value: {{ include "pluribusai.pgHost" . | quote }}
            - name: PGPORT
              value: {{ .Values.externalDatabase.port | default 5432 | quote }}
            - name: PGDATABASE
              value: {{ .Values.externalDatabase.database | default .Values.postgresql.auth.database | quote }}
            - name: PGUSER
              value: {{ .Values.externalDatabase.user | default .Values.postgresql.auth.username | quote }}
            {{- if eq (include "pluribusai.useBundledPostgres" .) "true" }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pluribusai.secretName" . }}
                  key: POSTGRES_PASSWORD
            {{- else if eq (include "pluribusai.useExternalPostgres" .) "true" }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pluribusai.secretName" . }}
                  key: EXTERNAL_DB_PASSWORD
            {{- end }}
            {{- end }}
            - name: PLURIBUSAI_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "pluribusai.secretName" . }}
                  key: PLURIBUSAI_TOKEN
            {{- if .Values.auth.apiKeys }}
            - name: PLURIBUSAI_API_KEYS_FILE
              value: /run/secrets/api-keys.json
            {{- end }}
          volumeMounts:
            {{- if eq .Values.store.type "sqlite" }}
            - name: data
              mountPath: /data
            {{- end }}
            {{- if .Values.auth.apiKeys }}
            - name: api-keys
              mountPath: /run/secrets
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if eq .Values.store.type "sqlite" }}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "pluribusai.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- if .Values.auth.apiKeys }}
        - name: api-keys
          secret:
            secretName: {{ include "pluribusai.secretName" . }}
            items:
              - key: api-keys.json
                path: api-keys.json
        {{- end }}
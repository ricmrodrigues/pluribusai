apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pluribusai
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "90"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "90"
spec:
  ingressClassName: nginx
  rules:
    - host: pluribusai.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pluribusai
                port:
                  number: 8787
  tls:
    - hosts:
        - pluribusai.example.com
      secretName: pluribusai-tls